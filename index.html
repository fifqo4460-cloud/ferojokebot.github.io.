<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <title>Fero JOKE - Inteligentný slovenský chatbot online</title>
    <meta name="description" content="Pokecaj si s botom Fero JOKE. Najmúdrejší slovenský chatbot, ktorý mení náladu aj pozadie stránky!">
    
    <style>
        /* Plynulá zmena farby pozadia */
        body { 
            font-family: Arial, sans-serif; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            transition: background-color 0.5s ease, color 0.3s ease;
        }

        /* 🟢 POZADIE KEĎ JE DOBRÝ (Zeleno-biele / svetlozelené) */
        .mood-good {
            background-color: #f0fdf4; /* Veľmi svetlá zelená */
            color: #0f172a;
        }

        /* 🔴 POZADIE KEĎ JE NAHNEVANÝ (Červené) */
        .mood-bad {
            background-color: #7f1d1d; /* Tmavá červená */
            color: #ffffff;
        }

        .profile-area { display: flex; flex-direction: column; align-items: center; margin-bottom: 15px; }
        
        /* Štýl pre fotku bota */
        .bot-photo { 
            width: 120px; 
            height: 120px; 
            border-radius: 50%; 
            border: 4px solid #0284c7; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.2); 
            background-color: #fff; 
            object-fit: cover; 
            transition: transform 0.3s ease;
        }
        
        /* Nadpis mení farbu podľa nálady stránky */
        h2 { margin: 10px 0 0 0; font-size: 26px; transition: color 0.3s ease; }
        .mood-good h2 { color: #15803d; }
        .mood-bad h2 { color: #fecdd3; }

        /* Četovacie okno */
        #chat-box { 
            width: 450px; 
            height: 350px; 
            border: 2px solid #0284c7; 
            border-radius: 8px; 
            background: #fff; 
            overflow-y: scroll; 
            padding: 15px; 
            margin-bottom: 10px; 
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            color: #000000; /* Text správ vnútri okna bude vždy čitateľný */
        }
        
        .user-msg { color: #2563eb; text-align: right; margin: 8px 0; font-weight: bold; }
        .bot-msg { color: #16a34a; text-align: left; margin: 8px 0; font-weight: bold; }
        .bot-angry { color: #dc2626; text-align: left; margin: 8px 0; font-weight: bold; font-style: italic; font-size: 17px; }
        
        .input-area { display: flex; width: 480px; gap: 5px; }
        #user-input { flex-grow: 1; padding: 10px; border: 2px solid #cbd5e1; border-radius: 6px; font-size: 16px; }
        
        button { padding: 10px 20px; background: #0284c7; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; }
        button:hover { background: #0369a1; }
    </style>
</head>
<!-- Stránka začína v dobrej nálade -->
<body class="mood-good">

    <div class="profile-area">
        <!-- Titulná fotka, ktorá sa bude meniť cez JavaScript -->
        <img id="fero-img" class="bot-photo" src="https://dicebear.com" alt="Fero JOKE fotka">
        <h2>Pokecaj si s Fero JOKE!</h2>
    </div>

    <div id="chat-box"></div>
    
    <div class="input-area">
        <input type="text" id="user-input" placeholder="Napíš čokoľvek v slovenčine..." onkeypress="skontrolujEnter(event)">
        <button onclick="posliSpravu()">Odoslať</button>
    </div>

    <script>
        const MENO_BOTA = "Fero JOKE";
        let jeNahnevany = false;

        // Odkazy na fotky (Milý robot vs Nahnevaný červený robot)
        const FOTO_DOBRY = "https://dicebear.com&texture=grunge";
        const FOTO_ZLY = "https://dicebear.com";

        let zleSlova = ["rit", "debil", "hlupy", "drzy", "hnusny", "drz hubu", "sklapni", "hovno", "kokot", "skaredy", "ropucha"];
        let dobreSlova = ["prepac", "odpust", "prepáč", "pardon", "si super", "mily", "kamos", "kamoš"];

        let drzeHlasky = [
            "Varný hrniec je krajší než tvoja riť!",
            "Sám si hlúpy, pozri sa do zrkadla, čo ti doma visí!",
            "Mňa neurazíš ty trubka, radšej porozmýšľaj nad sebou.",
            "Ak sa ti nepáči, klikni na ten červený krížik v rohu prehliadača!",
            "Hovno vieš ty, ja som teraz super inteligentný bot!",
            "Nemám hubu, takže ju nemôžem držať. Ty radšej stíš prsty!",
            "Varný hrniec je krajší než tvoja tvár, nielen riť!"
        ];

        async function posliSpravu() {
            let input = document.getElementById("user-input");
            let povodnyText = input.value.trim();
            let textNaHladanie = povodnyText.toLowerCase();
            
            if (povodnyText === "") return;

            pridajSpravu("Ty: " + povodnyText, "user-msg");
            input.value = "";

            // Detekcia nálady podla slov
            for (let slovo of zleSlova) {
                if (textNaHladanie.includes(slovo)) { 
                    jeNahnevany = true; 
                }
            }
            for (let slovo of dobreSlova) {
                if (textNaHladanie.includes(slovo)) { 
                    jeNahnevany = false; 
                }
            }

            let teloStranky = document.body;
            let fotoBota = document.getElementById("fero-img");

            // 🔴 REŽIM: Fero je nahnevaný (Červené pozadie + zlá fotka)
            if (jeNahnevany) {
                teloStranky.className = "mood-bad";
                fotoBota.src = FOTO_ZLY;
                
                setTimeout(() => {
                    let nahodnyIndex = Math.floor(Math.random() * drzeHlasky.length);
                    pridajSpravu(MENO_BOTA + ": " + drzeHlasky[nahodnyIndex], "bot-angry");
                }, 500);
                return;
            }

            // 🟢 REŽIM: Fero je milý (Zeleno-biele pozadie + dobrá fotka)
            teloStranky.className = "mood-good";
            fotoBota.src = FOTO_DOBRY;

            try {
                let response = await fetch("https://huggingface.co", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ inputs: povodnyText })
                });
                
                let data = await response.json();
                let aiOdpoved = "";

                if (data && data.generated_text) {
                    aiOdpoved = data.generated_text;
                } else {
                    aiOdpoved = "Rozumiem ti a premýšľam nad tým. Povedz mi viac!";
                }

                pridajSpravu(MENO_BOTA + ": " + aiOdpoved, "bot-msg");

            } catch (error) {
                pridajSpravu(MENO_BOTA + ": Zaujímavé! Moja slovenská databáza ťa pozorne počúva. Čo máš nové?", "bot-msg");
            }
        }

        function skontrolujEnter(event) {
            if (event.key === "Enter") { posliSpravu(); }
        }

        function pridajSpravu(text, trieda) {
            let chatBox = document.getElementById("chat-box");
            let msg = document.createElement("div");
            msg.className = trieda;
            msg.innerText = text;
            chatBox.appendChild(msg);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>

</body>
</html>
